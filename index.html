
<!-- Information from the API documentation, kept here for reference: -->

<!-- Authentication: Currently, no authentication is required to access the API. Simply make HTTP requests to the provided endpoints.
Base URL: The base URL for the API is https://www.freetogame.com/api.
Endpoints: Below are the available endpoints:
/games: Retrieve a list of all free-to-play games.
/game?id={game_id}: Retrieve details of a specific game by its ID.
/games?category={category_name}: Retrieve a list of all available games from a specific genre.
/games?platform={platform_name}: Retrieve a list of all available games from a specific platform.
/games?sort-by={sort_name}: Sort games by release date, alphabetical or relevance.
Making Requests: You can make HTTP GET requests to the endpoints using tools like cURL, Postman, or by directly accessing the URLs in your web browser. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tri-Game-Ma - Discover Free Games</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1 class="triforma-logo">Tri-Game-Ma - Discover Free Games</h1>
    </header>

    <!-- BANNER / TITLE SECTION -->
    <div class="page-title">
        <h1>Discover allegedly Free Games</h1>
        <h3 class="muted">Explore hundreds of allegedly free games.</h3>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- FILTER SECTION -->
        <div style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
            <select id="categoryFilter" style="padding: 0.6rem; border-radius: 0.6rem; border: 1px solid var(--divider); background: var(--card); color: var(--text); font-family: 'Roboto', sans-serif;">
                <option value="">All Categories</option>
                <option value="action">Action</option>
                <option value="adventure">Adventure</option>
                <option value="rpg">RPG</option>
                <option value="shooter">Shooter</option>
                <option value="strategy">Strategy</option>
                <option value="mmorpg">MMORPG</option>
                <option value="racing">Racing</option>
                <option value="sports">Sports</option>
            </select>
            

    <input type="text" id="searchBar" placeholder="Search games..." style="padding: 0.6rem; border-radius: 0.6rem; border: 1px solid var(--divider); background: var(--card); color: var(--text); font-family: 'Roboto', sans-serif; flex: 1;">




            <select id="platformFilter" style="padding: 0.6rem; border-radius: 0.6rem; border: 1px solid var(--divider); background: var(--card); color: var(--text); font-family: 'Roboto', sans-serif;">
                <option value="">All Platforms</option>
                <option value="pc">PC (Windows)</option>
                <option value="browser">Browser</option>
            </select>

            <select id="sortFilter" style="padding: 0.6rem; border-radius: 0.6rem; border: 1px solid var(--divider); background: var(--card); color: var(--text); font-family: 'Roboto', sans-serif;">
                <option value="">Sort By</option>
                <option value="popularity">Most Popular</option>
                <option value="release-date">Release Date</option>
                <option value="alphabetical">Alphabetical</option>
            </select>
        </div>

        <!-- LOADING STATE -->
        <div id="loading" style="text-align: center; padding: 2rem;">
            <p>Loading games...</p>
        </div>

        <!-- GAMES GRID -->
        <div class="grid" id="gamesContainer">
            <!-- Games will be populated here by JavaScript -->
            <!-- Assuming OBF doesn't block the API calls-->
            <!-- It works, about 40% of the time.-->
        </div>

        <!-- NO RESULTS MESSAGE -->
        <div id="noResults" style="text-align: center; padding: 2rem; display: none;">
            <p class="muted">No games found. Try adjusting the filters.</p>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="catchline">
            <p><strong>Play Free(mium) games!</strong>
            <br> How else are the devs supposed to make money?</p>
        </div>
        <div class="find-us">
            <p><strong>FreeToGame API</strong></p>
            <p><a href="https://www.freetogame.com">Source URL: https://www.freetogame.com</a></p>
        </div>
    </footer>

    <script>
        const gamesContainer = document.getElementById('gamesContainer');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('noResults');
        const categoryFilter = document.getElementById('categoryFilter');
        const platformFilter = document.getElementById('platformFilter');
        const sortFilter = document.getElementById('sortFilter');
        const startButton = document.getElementById('product-start');
        const searchBar = document.getElementById('searchBar');

        let allGames = [];

    // Fetch all games on page load
async function fetchGames() {
    try {
        loading.style.display = 'block';
        gamesContainer.innerHTML = '';
        noResults.style.display = 'none';



        // PRAISE CORSPROXY.IO, THE SAVIOR OF THIS PROJECT
        // DESTROYER OF PESKY CORS ERRORS, AND PROVIDER OF JSON DATA TO THE MASSES
        // I would have loved to fetch the data directly from the API, but due to CORS restrictions, 
        // I had to use a proxy service.
        const response = await fetch('https://corsproxy.io/?url=https://www.freetogame.com/api/games');
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        allGames = await response.json(); // parse JSON

        displayGames(allGames);
            } catch (error) {
                console.error('Error fetching games:', error);
                gamesContainer.innerHTML = '<p style="color: red;">Error loading games. Please try again later.</p>';
            } finally {
                loading.style.display = 'none';
            }
}


        // Display games based on filters
        function displayGames(games) {
            gamesContainer.innerHTML = '';

            // Limit to 30 games, that way my wifi doesn't die from loading 500+ games at once
            // This means that the sorting and filtering will only apply to the first 30 games,
            // A significant limitation, but hey, that's what the search bar is for.  
            // An actual app will have either infinite scrolling or pagination, but I don't have the time to implement that.
            // Given the relative brevity of this assignment, and it's concurrence with the final project. 
            const limitedGames = games.slice(0, 30);

            if (limitedGames.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            limitedGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.background = 'var(--card)';
                card.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
                
                const releaseDate = new Date(game.release_date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                card.innerHTML = `
                    <img src="${game.thumbnail}" alt="${game.title}" onerror="this.src='https://via.placeholder.com/300x200?text=Game+Image'">
                    <div class="meta">
                        <strong>${game.title}</strong>
                        <p style="font-size: 0.9rem; color: var(--muted); margin: 0;">
                            ${game.genre} • ${game.platform}
                        </p>
                        <p style="font-size: 0.85rem; color: var(--muted); margin: 5px 0 0 0;">
                            Released: ${releaseDate}
                        </p>
                        <p style="font-size: 0.85rem; color: var(--muted); margin: 5px 0 0 0;">
                            By: ${game.developer}
                        </p>
                        <p style="font-size: 0.9rem; margin: 10px 0 0 0; color: var(--text);">${game.short_description}</p>
                        <a href="${game.game_url}" target="_blank" class="btn">Play Now</a>
                    </div>
                `;
                
                gamesContainer.appendChild(card);
            });
        }

        // Filter games based on selections
        // Includes the search function
        function applyFilters() {
            let filtered = [...allGames];
            
            // Sets everything to lowercase to make the filters case-insensitive. 
            const category = categoryFilter.value.toLowerCase();
            const platform = platformFilter.value.toLowerCase();
            const sort = sortFilter.value;
            const searchQuery = searchBar.value.toLowerCase();

            // Category filter
            if (category) {
                filtered = filtered.filter(game => game.genre.toLowerCase().includes(category));
            }

            // Platform filter  
            if (platform === 'pc') {
                filtered = filtered.filter(game => game.platform.includes('Windows') || game.platform.includes('PC'));
            } else if (platform === 'browser') {
                filtered = filtered.filter(game => game.platform.includes('Browser') || game.platform.includes('Web'));
            }

            // Search filter
            if (searchQuery) {
                filtered = filtered.filter(game => game.title.toLowerCase().includes(searchQuery));
            }

            // Sort games
            if (sort === 'popularity') {
                filtered.sort((a, b) => b.id - a.id);
            } else if (sort === 'release-date') {
                filtered.sort((a, b) => new Date(b.release_date) - new Date(a.release_date));
            } else if (sort === 'alphabetical') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            }

            displayGames(filtered);
        }

        // Event listeners
        categoryFilter.addEventListener('change', applyFilters);
        platformFilter.addEventListener('change', applyFilters);
        sortFilter.addEventListener('change', applyFilters);
        searchBar.addEventListener('input', applyFilters);

        // Initial load
        fetchGames();
    </script>
</body>
</html>
